<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="260" height="260" viewBox="0 0 195 195" version="1.2">
  <!-- Bookwise logo optimized for e-ink: high contrast black and white -->

  <!-- Background rounded rectangle -->
  <rect x="15" y="0" width="165" height="195" rx="22" ry="22" fill="#000000"/>
  <rect x="18" y="3" width="159" height="189" rx="20" ry="20" fill="#ffffff"/>

  <!-- Open book icon - centered -->
  <g transform="translate(97.5, 72)">
    <!-- Left page -->
    <path d="M -3,-32 C -3,-32 -42,-28 -48,-22 L -48,32 C -42,26 -3,22 -3,22 Z"
          fill="none" stroke="#000000" stroke-width="4" stroke-linejoin="round"/>
    <!-- Right page -->
    <path d="M 3,-32 C 3,-32 42,-28 48,-22 L 48,32 C 42,26 3,22 3,22 Z"
          fill="none" stroke="#000000" stroke-width="4" stroke-linejoin="round"/>
    <!-- Spine line -->
    <line x1="0" y1="-34" x2="0" y2="24" stroke="#000000" stroke-width="3"/>
    <!-- Page lines left -->
    <line x1="-38" y1="-12" x2="-10" y2="-16" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
    <line x1="-38" y1="-2" x2="-10" y2="-6" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
    <line x1="-38" y1="8" x2="-10" y2="4" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
    <!-- Page lines right -->
    <line x1="38" y1="-12" x2="10" y2="-16" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
    <line x1="38" y1="-2" x2="10" y2="-6" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
    <line x1="38" y1="8" x2="10" y2="4" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- "Bookwise" text -->
  <text x="97.5" y="140" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="bold"
        fill="#000000" text-anchor="middle" dominant-baseline="middle">Bookwise</text>

  <!-- Thin line separator -->
  <line x1="50" y1="155" x2="145" y2="155" stroke="#000000" stroke-width="1" opacity="0.3"/>

  <!-- "by Readwise" subtitle -->
  <text x="97.5" y="170" font-family="Georgia, 'Times New Roman', serif" font-size="13"
        fill="#000000" text-anchor="middle" dominant-baseline="middle" opacity="0.6">by Readwise</text>
</svg>
